<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>mind_pressure_arc Pixi QA</title>
    <style>
        body {
            margin: 0;
            background: #1a1f2e;
            color: #d8e0f0;
            font-family: Consolas, monospace;
            padding: 16px;
        }
        #stage {
            position: relative;
            width: 480px;
            height: 120px;
            margin: 16px 0;
            border: 2px dashed #4a6a9a;
            background: linear-gradient(180deg, #222838 0%, #1a1f2e 100%);
            overflow: hidden;
        }
        .pass { color: #6bcf3a; }
        .fail { color: #ff6b6b; }
        #results li { margin: 4px 0; }
    </style>
</head>
<body>
    <h1>mind_pressure_arc — Pixi QA</h1>
    <div id="stage"></div>
    <button id="replay">Replay Flight</button>
    <ul id="results"></ul>

    <script src="../vendor/pixi.min.js"></script>
    <script>
        const MANIFEST = "../assets/effects/projectiles/mind_pressure_arc/mind_pressure_projectile.json";
        const FRAME_W = 64;
        const FRAME_H = 24;
        const FRAME_COUNT = 8;
        const results = document.getElementById("results");

        function log(pass, text) {
            const li = document.createElement("li");
            li.className = pass ? "pass" : "fail";
            li.textContent = (pass ? "OK: " : "FAIL: ") + text;
            results.appendChild(li);
            return pass;
        }

        PIXI.settings.SCALE_MODE = PIXI.SCALE_MODES.NEAREST;

        const app = new PIXI.Application({
            backgroundAlpha: 0,
            width: 480,
            height: 120,
            antialias: false,
            resolution: Math.min(window.devicePixelRatio || 1, 2),
            autoDensity: true
        });

        document.getElementById("stage").appendChild(app.view);

        let spritesheetCache = null;
        let animatedSprite = null;

        async function runQa() {
            results.innerHTML = "";
            let allPass = true;

            const response = await fetch(MANIFEST);
            allPass &= log(response.ok, "JSON-Manifest ladbar");

            const manifest = await response.json();
            const imagePath = MANIFEST.replace(/[^/]+$/, manifest.meta.image);

            const baseTexture = PIXI.BaseTexture.from(imagePath);
            baseTexture.scaleMode = PIXI.SCALE_MODES.NEAREST;

            await new Promise(resolve => {
                if (baseTexture.valid) return resolve();
                baseTexture.once("loaded", resolve);
            });

            allPass &= log(baseTexture.valid, "Sprite Sheet Textur geladen");
            allPass &= log(
                baseTexture.scaleMode === PIXI.SCALE_MODES.NEAREST,
                "BaseTexture NEAREST Scaling"
            );

            const sheet = new PIXI.Spritesheet(baseTexture, manifest);
            await sheet.parse();
            spritesheetCache = sheet;

            allPass &= log(
                sheet.animations.play.length === FRAME_COUNT,
                "Animation hat 8 Frames"
            );

            const textures = sheet.animations.play;
            textures.forEach((texture, index) => {
                const frame = texture.frame;
                allPass &= log(
                    frame.width === FRAME_W && frame.height === FRAME_H,
                    `Frame ${index} Groesse ${frame.width}x${frame.height}`
                );
                allPass &= log(
                    texture.baseTexture.scaleMode === PIXI.SCALE_MODES.NEAREST,
                    `Frame ${index} NEAREST Scaling`
                );
            });

            playFlight(textures);

            allPass &= log(animatedSprite.anchor.x === 0.5, "Pivot X = 0.5");
            allPass &= log(animatedSprite.anchor.y === 0.5, "Pivot Y = 0.5");
            allPass &= log(animatedSprite.width === FRAME_W, "Display-Breite 64px");
            allPass &= log(animatedSprite.height === FRAME_H, "Display-Hoehe 24px");
            allPass &= log(animatedSprite.loop === true, "Loop waehrend Flug");

            let frameChanges = 0;
            let lastFrame = -1;
            const start = performance.now();

            return new Promise(resolve => {
                const tick = () => {
                    if (animatedSprite.currentFrame !== lastFrame) {
                        frameChanges += 1;
                        lastFrame = animatedSprite.currentFrame;
                    }

                    if (performance.now() - start > 260) {
                        allPass &= log(frameChanges >= 3, `Saubere Frame-Wechsel (${frameChanges})`);
                        allPass &= log(allPass, allPass ? "ALLE PIXI-PRUEFUNGEN BESTANDEN" : "PIXI-PRUEFUNGEN FEHLGESCHLAGEN");
                        resolve(allPass);
                        return;
                    }

                    requestAnimationFrame(tick);
                };

                requestAnimationFrame(tick);
            });
        }

        function playFlight(textures) {
            if (animatedSprite) {
                animatedSprite.destroy();
            }

            animatedSprite = new PIXI.AnimatedSprite(textures);
            animatedSprite.anchor.set(0.5);
            animatedSprite.loop = true;
            animatedSprite.animationSpeed = 0.45;
            animatedSprite.width = FRAME_W;
            animatedSprite.height = FRAME_H;
            animatedSprite.rotation = 0;
            animatedSprite.position.set(40, 60);
            animatedSprite.gotoAndPlay(0);

            app.stage.removeChildren();
            app.stage.addChild(animatedSprite);

            const startX = 40;
            const endX = 440;
            const startTime = performance.now();
            const duration = 400;

            const move = () => {
                const t = Math.min(1, (performance.now() - startTime) / duration);
                animatedSprite.position.x = startX + (endX - startX) * t;

                if (t < 1) {
                    requestAnimationFrame(move);
                }
            };

            move();
        }

        document.getElementById("replay").addEventListener("click", async () => {
            if (spritesheetCache) {
                playFlight(spritesheetCache.animations.play);
            } else {
                await runQa();
            }
        });

        runQa();
    </script>
</body>
</html>
