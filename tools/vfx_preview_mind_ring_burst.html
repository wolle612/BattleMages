<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>mind_ring_burst Pixi QA</title>
    <style>
        body {
            margin: 0;
            background: #1a1f2e;
            color: #d8e0f0;
            font-family: Consolas, monospace;
            padding: 16px;
        }
        #stage {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 16px 0;
            border: 2px dashed #4a6a9a;
            background: linear-gradient(180deg, #222838 0%, #1a1f2e 100%);
        }
        #portrait {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 136px;
            height: 136px;
            transform: translate(-50%, -50%);
            border: 2px solid #7a4555;
            border-radius: 4px;
            background: #2a3040;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        }
        .pass { color: #6bcf3a; }
        .fail { color: #ff6b6b; }
        #results li { margin: 4px 0; }
    </style>
</head>
<body>
    <h1>mind_ring_burst — Pixi QA</h1>
    <div id="stage">
        <div id="portrait" aria-hidden="true"></div>
    </div>
    <button id="replay">Replay</button>
    <ul id="results"></ul>

    <script src="../vendor/pixi.min.js"></script>
    <script>
        const MANIFEST = "../assets/effects/impact/mind_ring_burst/mind_ring_burst.json";
        const FRAME_SIZE = 96;
        const FRAME_COUNT = 8;
        const results = document.getElementById("results");

        function log(pass, text) {
            const li = document.createElement("li");
            li.className = pass ? "pass" : "fail";
            li.textContent = (pass ? "OK: " : "FAIL: ") + text;
            results.appendChild(li);
            return pass;
        }

        PIXI.settings.SCALE_MODE = PIXI.SCALE_MODES.NEAREST;

        const app = new PIXI.Application({
            backgroundAlpha: 0,
            width: 320,
            height: 320,
            antialias: false,
            resolution: Math.min(window.devicePixelRatio || 1, 2),
            autoDensity: true
        });

        document.getElementById("stage").appendChild(app.view);

        let spritesheetCache = null;
        let animatedSprite = null;
        let loadCount = 0;

        async function runQa() {
            results.innerHTML = "";
            let allPass = true;

            const response = await fetch(MANIFEST);
            allPass &= log(response.ok, "JSON-Manifest ladbar");

            const manifest = await response.json();
            const imagePath = MANIFEST.replace(/[^/]+$/, manifest.meta.image);

            const baseTexture = PIXI.BaseTexture.from(imagePath);
            baseTexture.scaleMode = PIXI.SCALE_MODES.NEAREST;

            await new Promise(resolve => {
                if (baseTexture.valid) return resolve();
                baseTexture.once("loaded", resolve);
            });

            allPass &= log(baseTexture.valid, "Sprite Sheet Textur geladen");

            const sheet = new PIXI.Spritesheet(baseTexture, manifest);
            await sheet.parse();

            spritesheetCache = sheet;
            loadCount += 1;

            allPass &= log(
                sheet.animations.play.length === FRAME_COUNT,
                "Animation hat 8 Frames"
            );

            const textures = sheet.animations.play;
            textures.forEach((texture, index) => {
                const frame = texture.frame;
                allPass &= log(
                    frame.width === FRAME_SIZE && frame.height === FRAME_SIZE,
                    `Frame ${index} Groesse ${frame.width}x${frame.height}`
                );
                allPass &= log(
                    texture.baseTexture.scaleMode === PIXI.SCALE_MODES.NEAREST,
                    `Frame ${index} NEAREST Scaling`
                );
            });

            // Cache check
            const sheet2 = new PIXI.Spritesheet(baseTexture, manifest);
            await sheet2.parse();
            allPass &= log(
                sheet2.textures === sheet.textures,
                "Texture-Instanzen wiederverwendbar (gleiche BaseTexture)"
            );

            playAnimation(textures);

            allPass &= log(animatedSprite.anchor.x === 0.5, "Pivot X = 0.5");
            allPass &= log(animatedSprite.anchor.y === 0.5, "Pivot Y = 0.5");
            allPass &= log(animatedSprite.width === 96, "Display-Breite 96px");
            allPass &= log(animatedSprite.loop === false, "Kein Loop");

            let frameChanges = 0;
            let lastFrame = -1;
            const start = performance.now();

            return new Promise(resolve => {
                const tick = () => {
                    if (animatedSprite.currentFrame !== lastFrame) {
                        frameChanges += 1;
                        lastFrame = animatedSprite.currentFrame;
                    }

                    if (!animatedSprite.playing && performance.now() - start > 80) {
                        allPass &= log(frameChanges >= 7, `Keine Frame-Spruenge (${frameChanges} Wechsel)`);
                        allPass &= log(
                            performance.now() - start < 500,
                            "Animation endet sauber unter 500ms"
                        );
                        allPass &= log(allPass, allPass ? "ALLE PIXI-PRUEFUNGEN BESTANDEN" : "PIX PRUEFUNGEN FEHLGESCHLAGEN");
                        resolve(allPass);
                        return;
                    }

                    requestAnimationFrame(tick);
                };

                requestAnimationFrame(tick);
            });
        }

        function playAnimation(textures) {
            if (animatedSprite) {
                animatedSprite.destroy();
            }

            animatedSprite = new PIXI.AnimatedSprite(textures);
            animatedSprite.anchor.set(0.5);
            animatedSprite.loop = false;
            animatedSprite.animationSpeed = 0.55;
            animatedSprite.width = 96;
            animatedSprite.height = 96;
            animatedSprite.position.set(160, 160);
            animatedSprite.gotoAndPlay(0);

            app.stage.removeChildren();
            app.stage.addChild(animatedSprite);
        }

        document.getElementById("replay").addEventListener("click", async () => {
            if (spritesheetCache) {
                playAnimation(spritesheetCache.animations.play);
            } else {
                await runQa();
            }
        });

        runQa();
    </script>
</body>
</html>
